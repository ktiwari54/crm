name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-unit:
    name: API unit tests + build
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci_test_secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Windows-generated lockfile omits Linux-native optional binaries
      # (lightningcss/swc for Tailwind v4); reinstall so they resolve.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run db:generate
      - run: npm run test:api
      - run: npm run build:api
      - run: npm run build:web

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm_dev_password
          POSTGRES_DB: crm
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U crm"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://crm:crm_dev_password@localhost:5432/crm?schema=public
      JWT_SECRET: ci_test_secret
      BILLING_CRON_DISABLED: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Windows-generated lockfile omits Linux-native optional binaries
      # (lightningcss/swc for Tailwind v4); reinstall so they resolve.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run db:generate
      - name: Push schema + seed
        run: |
          (cd apps/api && npx prisma db push)
          npm run db:seed
      - run: npx playwright install --with-deps chromium
      - name: Start servers
        run: |
          npm run dev:api > api.log 2>&1 &
          npm run dev:web > web.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:4000/api/v1/auth/sso/login >/dev/null 2>&1 && \
            curl -sf http://localhost:3000 >/dev/null 2>&1 && echo "servers up" && break
            sleep 2
          done
      - run: npx playwright test
      - if: failure()
        run: cat api.log web.log || true
