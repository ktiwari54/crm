# Full-stack production-style run: builds the API + web images and starts them
# with Postgres. Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml run --rm migrate   # first run only
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_dev_password}
      POSTGRES_DB: crm
    volumes:
      - crm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crm -d crm']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://crm:${POSTGRES_PASSWORD:-crm_dev_password}@postgres:5432/crm?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      PORT: 4000
      # Optional integrations — uncomment and set as needed:
      # STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked at build time — point at the browser-reachable API URL.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '3000:3000'

  # One-shot job: push the Prisma schema and seed. Run once after first `up`.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles: ['tools']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://crm:${POSTGRES_PASSWORD:-crm_dev_password}@postgres:5432/crm?schema=public
    working_dir: /app/apps/api
    command: sh -c "npx prisma db push && npx tsx prisma/seed.ts"

volumes:
  crm_pg_data:
